services:
  - type: web
    name: bibliotech
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bibliotech-db
          property: connectionString

databases:
  - name: bibliotech-db
    plan: free
