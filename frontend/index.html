<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/appicon-system-v2.png" type="image/png">
    <link rel="apple-touch-icon" href="img/appicon-system-v2.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#f5f2ec">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BIBLIOTECH">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="js/theme-bootstrap.js"></script>
    <title>Вход | BIBLIOTECH</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <button class="auth-theme-toggle" id="authThemeToggle" type="button" title="Тёмная тема">🌙</button>
    <div class="auth-container">
        <div class="auth-brand"><img src="img/appicon-system-v2.png" alt="BIBLIOTECH logo"><h1>BIBLIOTECH</h1></div>

        <div class="tabs" role="tablist" aria-label="Вход и регистрация">
            <button class="tab active" id="loginTab" type="button" role="tab" aria-controls="loginForm" aria-selected="true" tabindex="0" onclick="switchTab('login')">Вход</button>
            <button class="tab" id="registerTab" type="button" role="tab" aria-controls="registerForm" aria-selected="false" tabindex="-1" onclick="switchTab('register')">Регистрация</button>
        </div>

        <div id="loginForm" class="form active" role="tabpanel" aria-labelledby="loginTab" tabindex="0">
            <label for="loginUsername">Имя пользователя</label>
            <input type="text" id="loginUsername" name="username" autocomplete="username webauthn" placeholder="Имя пользователя">
            <label for="loginPassword">Пароль</label>
            <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="Пароль">
            <button type="button" onclick="login()">Войти</button>
            <button class="passkey-login-btn" id="passkeyLoginBtn" type="button" hidden><span aria-hidden="true">◉</span> Войти по passkey</button>
            <button class="guest-btn" type="button" onclick="guestLogin()">Войти как гость</button>
            <button class="auth-link-btn" onclick="switchTab('reset')" type="button">Забыли пароль?</button>
            <div id="loginError" class="error" role="alert" aria-live="assertive"></div>
        </div>

        <div id="registerForm" class="form" role="tabpanel" aria-labelledby="registerTab" tabindex="0">
            <label for="regUsername">Имя пользователя</label>
            <input type="text" id="regUsername" name="username" autocomplete="username" placeholder="Имя пользователя">
            <label for="regEmail">Электронная почта</label>
            <input type="email" id="regEmail" name="email" autocomplete="email" placeholder="Электронная почта">
            <label for="regPassword">Пароль</label>
            <input type="password" id="regPassword" name="new-password" autocomplete="new-password" placeholder="Пароль (мин. 4 символа)">
            <button type="button" onclick="register()">Зарегистрироваться</button>
            <div id="regError" class="error" role="alert" aria-live="assertive"></div>
            <div id="regSuccess" class="success" role="status" aria-live="polite"></div>
        </div>

        <div id="resetForm" class="form" role="tabpanel" aria-label="Восстановление пароля" tabindex="0">
            <div class="reset-step active" id="resetEmailStep">
                <p class="reset-note">Введите почту аккаунта — мы отправим код восстановления.</p>
                <label for="resetEmail">Электронная почта аккаунта</label>
                <input type="email" id="resetEmail" name="email" autocomplete="email" placeholder="Электронная почта аккаунта">
                <button type="button" onclick="requestPasswordReset()">Отправить код</button>
            </div>
            <div class="reset-step" id="resetCodeStep" hidden>
                <p class="reset-note">Введите код из письма и придумайте новый пароль.</p>
                <label for="resetCode">Код из письма</label>
                <input type="text" id="resetCode" name="one-time-code" inputmode="numeric" autocomplete="one-time-code" placeholder="Код из письма">
                <label for="resetPassword">Новый пароль</label>
                <input type="password" id="resetPassword" name="new-password" autocomplete="new-password" placeholder="Новый пароль">
                <button type="button" onclick="confirmPasswordReset()">Сменить пароль</button>
                <button class="auth-link-btn" onclick="showResetStep('email')" type="button">Отправить код заново</button>
            </div>
            <button class="auth-link-btn" onclick="switchTab('login')" type="button">Вернуться ко входу</button>
            <div id="resetInfo" class="success" role="status" aria-live="polite"></div>
            <div id="resetError" class="error" role="alert" aria-live="assertive"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/passkey-login.js?v=20260713-passkey-1"></script>
    <script src="js/auth-clear.js?v=20260709-search-style-1"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
