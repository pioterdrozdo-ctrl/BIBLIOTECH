<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/appicon-forest.png" type="image/png">
    <link rel="apple-touch-icon" href="img/appicon-forest.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#f5f2ec">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BIBLIOTECH">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="js/theme-bootstrap.js"></script>
    <title>Вход | BIBLIOTECH</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <button class="auth-theme-toggle" id="authThemeToggle" type="button" title="Тёмная тема">🌙</button>
    <div class="auth-container">
        <div class="auth-brand"><img src="img/appicon.png" alt="BIBLIOTECH logo"><h1>BIBLIOTECH</h1></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Вход</button>
            <button class="tab" onclick="switchTab('register')">Регистрация</button>
        </div>

        <div id="loginForm" class="form active">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <button class="guest-btn" onclick="guestLogin()">Войти как гость</button>
            <button class="auth-link-btn" onclick="switchTab('reset')" type="button">Забыли пароль?</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="registerForm" class="form">
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="email" id="regEmail" placeholder="Электронная почта">
            <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)">
            <button onclick="register()">Зарегистрироваться</button>
            <div id="regError" class="error"></div>
            <div id="regSuccess" class="success"></div>
        </div>

        <div id="resetForm" class="form">
            <div class="reset-step active" id="resetEmailStep">
                <p class="reset-note">Введите почту аккаунта — мы отправим код восстановления.</p>
                <input type="email" id="resetEmail" placeholder="Электронная почта аккаунта">
                <button onclick="requestPasswordReset()">Отправить код</button>
            </div>
            <div class="reset-step" id="resetCodeStep" hidden>
                <p class="reset-note">Введите код из письма и придумайте новый пароль.</p>
                <input type="text" id="resetCode" inputmode="numeric" placeholder="Код из письма">
                <input type="password" id="resetPassword" placeholder="Новый пароль">
                <button onclick="confirmPasswordReset()">Сменить пароль</button>
                <button class="auth-link-btn" onclick="showResetStep('email')" type="button">Отправить код заново</button>
            </div>
            <button class="auth-link-btn" onclick="switchTab('login')" type="button">Вернуться ко входу</button>
            <div id="resetInfo" class="success"></div>
            <div id="resetError" class="error"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth-clear.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
