name: Unsigned Google Play Bundle

on:
  pull_request:
    paths:
      - 'android-app/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

jobs:
  build-release-bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0'

      - name: Build unsigned release AAB
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Upload unsigned release AAB
        uses: actions/upload-artifact@v4
        with:
          name: bibliotech-unsigned-release
          path: android-app/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 1
