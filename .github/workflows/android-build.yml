name: Android App Bundle

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android-app/**'
      - '.github/workflows/android-build.yml'
  push:
    branches:
      - main
      - feature/google-play-app
    paths:
      - 'android-app/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

jobs:
  build-debug-bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          if ! sdkmanager 'platforms;android-35' 'build-tools;35.0.0' > sdk-install.log 2>&1; then
            tail -n 120 sdk-install.log
            exit 1
          fi

      - name: Build debug AAB
        run: |
          chmod +x gradlew
          if ! ./gradlew :app:bundleDebug --no-daemon --stacktrace > android-build.log 2>&1; then
            tail -n 180 android-build.log
            exit 1
          fi
          tail -n 40 android-build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: |
            android-app/android-build.log
            android-app/sdk-install.log
          if-no-files-found: ignore

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bibliotech-debug-aab
          path: android-app/app/build/outputs/bundle/debug/app-debug.aab
          if-no-files-found: error
