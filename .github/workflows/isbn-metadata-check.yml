name: ISBN metadata check

on:
  pull_request:
    paths:
      - 'backend/routes/bookMetadata.js'
      - 'backend/routes/catalogList.js'
      - 'backend/services/isbnMetadata.js'
      - 'backend/services/bookMetadataSchema.js'
      - 'backend/services/localBookMetadataStore.js'
      - 'backend/services/registerBookMetadataFallback.js'
      - 'backend/server.js'
      - 'backend/sql/init.sql'
      - 'frontend/js/book-metadata.js'
      - 'frontend/css/book-metadata.css'
      - 'frontend/js/pwa.js'
      - 'frontend/sw.js'
      - 'scripts/check-isbn-metadata.js'
      - '.github/workflows/isbn-metadata-check.yml'
  push:
    branches: [main]
    paths:
      - 'backend/routes/bookMetadata.js'
      - 'backend/routes/catalogList.js'
      - 'backend/services/isbnMetadata.js'
      - 'backend/services/bookMetadataSchema.js'
      - 'backend/services/localBookMetadataStore.js'
      - 'backend/services/registerBookMetadataFallback.js'
      - 'backend/server.js'
      - 'backend/sql/init.sql'
      - 'frontend/js/book-metadata.js'
      - 'frontend/css/book-metadata.css'
      - 'frontend/js/pwa.js'
      - 'frontend/sw.js'
      - 'scripts/check-isbn-metadata.js'

permissions:
  contents: read

jobs:
  check-isbn-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install application
        run: npm install
      - name: Check JavaScript syntax
        run: |
          node --check backend/routes/bookMetadata.js
          node --check backend/services/isbnMetadata.js
          node --check backend/services/bookMetadataSchema.js
          node --check backend/services/localBookMetadataStore.js
          node --check backend/services/registerBookMetadataFallback.js
          node --check backend/routes/catalogList.js
          node --check backend/server.js
          node --check frontend/js/book-metadata.js
          node --check frontend/js/pwa.js
          node --check frontend/sw.js
          node --check scripts/check-isbn-metadata.js
      - name: Validate ISBN metadata feature
        run: node scripts/check-isbn-metadata.js
